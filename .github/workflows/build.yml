name: Build MediaVault Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Patch workspace config for Windows CI
        run: |
          node -e "
          const fs = require('fs');
          // Read and normalize line endings
          let c = fs.readFileSync('pnpm-workspace.yaml', 'utf8').replace(/\r\n/g, '\n');

          // Remove overrides that block Windows-native rollup and esbuild modules
          c = c.replace(/  \"rollup>@rollup\/rollup-win32[^\"]+\": \"-\"\n/g, '');
          c = c.replace(/  \"esbuild>@esbuild\/win32[^\"]+\": \"-\"\n/g, '');

          // Allow electron + embedded-postgres to run their binary-download scripts
          c = c.replace(
            '  - unrs-resolver\n',
            '  - unrs-resolver\n  - electron\n  - \'@embedded-postgres/windows-x64\'\n'
          );

          fs.writeFileSync('pnpm-workspace.yaml', c);
          console.log('pnpm-workspace.yaml patched for Windows CI');
          "

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Windows icon (.ico)
        working-directory: artifacts/mediavault-electron/build-resources
        run: npx --yes png-to-ico icon.png > icon.ico

      - name: Build Windows installer
        run: pnpm --filter @workspace/mediavault-electron run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: MediaVault-Windows
          path: artifacts/mediavault-electron/dist-installer/*.exe
          if-no-files-found: error
          retention-days: 30
